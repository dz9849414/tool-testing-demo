server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: tool-testing-demo
  redis:
    host: ${SPRING_REDIS_HOST:localhost}
    port: ${SPRING_REDIS_PORT:6379}
    password: ${SPRING_REDIS_PASSWORD:}
    database: ${SPRING_REDIS_DATABASE:0}
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 2
  # 时区配置
  jackson:
    time-zone: Asia/Shanghai

  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/tool_testing?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}

  # MyBatis Plus配置
  mybatis-plus:
    configuration:
      map-underscore-to-camel-case: true
      log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    global-config:
      db-config:
        id-type: assign_id
        logic-delete-field: isDeleted
        logic-delete-value: 1
        logic-not-delete-value: 0

# JWT配置
jwt:
  secret: ${JWT_SECRET:mySecretKeyForJWTGenerationInSpringBootApplication2024}
  expiration: ${JWT_EXPIRATION:864000}
  header: ${JWT_HEADER:Authorization}



# 安全配置
security:
  ignored:
    - /api/auth/**
    - /swagger-ui/authorization
    - /v3/api-docs/**
    - /webjars/**
    - /hello

# 文件上传配置
app:
  file:
    # 文件上传路径（绝对路径，默认使用用户目录下的 tool-testing-uploads 文件夹）
    # 示例：C:\Users\用户名\tool-testing-uploads 或 /home/用户名/tool-testing-uploads
    upload-path: ${APP_FILE_UPLOAD_PATH:D:\file}
    # 文件访问基础URL（可选）
    base-url:
    # 最大文件大小
    max-file-size: 10MB
    # 最大请求大小
    max-request-size: 100MB

# Spring 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 100MB

# 日志配置
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  level:
    com.example.tooltestingdemo: ${LOG_LEVEL_APP:DEBUG}
    org.springframework.security: ${LOG_LEVEL_SECURITY:INFO}
