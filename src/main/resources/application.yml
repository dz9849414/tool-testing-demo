server:
  port: 8080

spring:
  application:
    name: tool-testing-demo

  # 时区配置
  jackson:
    time-zone: Asia/Shanghai
  
  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/tool_testing?useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
  
  # MyBatis Plus配置
  mybatis-plus:
    configuration:
      map-underscore-to-camel-case: true
      log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    global-config:
      db-config:
        id-type: assign_id
        logic-delete-field: isDeleted
        logic-delete-value: 1
        logic-not-delete-value: 0

# JWT配置
jwt:
  secret: mySecretKeyForJWTGenerationInSpringBootApplication2024
  expiration: 864000
  header: Authorization

# 安全配置
security:
  ignored:
    - /api/auth/**
    - /swagger-ui/**
    - /v3/api-docs/**
    - /webjars/**

# 文件上传配置
app:
  trace-id:
    enabled: true
    request-header: X-Trace-Id
    response-header: X-Trace-Id
    allow-request-override: true
    include-in-response-header: true
  method-trace:
    enabled: true
    include-packages:
      - com.example.tooltestingdemo.service.impl.template
    log-args: true
    log-result: false
    max-length: 300
  trace-log-query:
    enabled: true
    max-entries-per-trace: 500
    max-trace-count: 200
    include-logger-prefixes:
      - com.example.tooltestingdemo
  file:
    # 文件上传路径（绝对路径，默认使用用户目录下的 tool-testing-uploads 文件夹）
    # 示例：C:\Users\用户名\tool-testing-uploads 或 /home/用户名/tool-testing-uploads
    upload-path: D:\file
    # 文件访问基础URL（可选）
    base-url:
    # 最大文件大小
    max-file-size: 10MB
    # 最大请求大小
    max-request-size: 100MB

# Spring 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 100MB

# 日志配置
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [traceId=%X{traceId:-}] - %msg%n"
  level:
    com.example.tooltestingdemo: DEBUG
    org.springframework.security: INFO
